# Optional: Render Dashboard → New → Blueprint → connect this repo.
# Frontend defaults to https://chexit.onrender.com — VITE_CHEXIT_API_URL on Vercel is optional unless you change the API host.
# CORS: *.vercel.app is allowed via CHEXIT_CORS_ORIGIN_REGEX by default; add CHEXIT_CORS_ORIGINS for custom domains.
# /predict can take many minutes — pick an instance with enough RAM/CPU for TensorFlow.
# U-Net weights are gitignored; on startup the API downloads them from Google Drive (gdown) unless
# files already exist under assets/models/. Drive files must be “Anyone with the link” (Viewer).

services:
  - type: web
    name: chexit-api
    # Run build/start from this folder. If the dashboard Root Directory is already chexit-backend,
    # using paths like chexit-backend/requirements.txt fails (double folder).
    rootDir: chexit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CHEXIT_CORS_ORIGINS
        sync: false
